name: Smart Banking Fraud Detection CI/CD

# 1. TRIGGER: This pipeline runs automatically when you push code to the 'main' branch
on:
  push:
    branches:
      - main

jobs:
  # ==========================================
  # CONTINUOUS INTEGRATION (CI)
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Syntax Check (Linting)
        # Ensures your PySpark notebook doesn't have fatal Python errors before building
        run: |
          pip install flake8 nbqa
          nbqa flake8 Fraud_Detection.ipynb --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Build Docker Image
        run: docker build -t smart-banking-fraud:latest .

  # ==========================================
  # CONTINUOUS DEPLOYMENT (CD)
  # ==========================================
  push-and-deploy:
    needs: build-and-test # Waits for the CI job to succeed first
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Note: To actually push to DockerHub, you need to add your Docker username 
      # and password as "Secrets" in your GitHub repository settings.
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/smart-banking-fraud:latest

      # Note: Since your Kubernetes cluster (Minikube) is running locally on your laptop, 
      # GitHub's cloud servers cannot directly communicate with it. 
      # In a real enterprise setup, this step connects to a cloud cluster (like AWS EKS or GCP GKE).
      - name: Simulate Kubernetes Deployment
        run: |
          echo "Connecting to Kubernetes Cluster..."
          echo "Applying deployment.yaml..."
          echo "Applying service.yaml..."
          echo "Deployment Updated Successfully!"